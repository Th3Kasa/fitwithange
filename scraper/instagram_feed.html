<!--
  instagram_feed.html — Drop-in Instagram feed widget for FitWithAnge
  =====================================================================
  USAGE: Copy everything between the CUT LINES into your index.html
  where you want the Instagram grid to appear.

  REQUIREMENTS:
    - assets/data/instagram.json must exist (generated by inject.py)
    - The CSS variables below match the site's gold #d4a574 accent colour

  The JS fetches instagram.json and renders a 3-column responsive grid
  linking each image back to the original Instagram post.
-->

<!-- ===================== CUT FROM HERE ===================== -->

<section class="ig-feed-section" id="instagram-feed" aria-label="Instagram feed">
  <div class="ig-feed-container">

    <div class="ig-feed-header">
      <svg class="ig-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"
              stroke="currentColor" stroke-width="2"/>
        <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="2"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
      </svg>
      <div class="ig-feed-heading-text">
        <h2 class="ig-feed-title">Follow Along</h2>
        <a class="ig-feed-handle"
           href="https://www.instagram.com/fitwith_ange/"
           target="_blank"
           rel="noopener noreferrer">@fitwith_ange</a>
      </div>
    </div>

    <!-- Grid populated by JS -->
    <div class="ig-grid" id="ig-grid" role="list" aria-label="Recent Instagram posts">
      <!-- Loading skeleton placeholders -->
      <div class="ig-skeleton" aria-hidden="true"></div>
      <div class="ig-skeleton" aria-hidden="true"></div>
      <div class="ig-skeleton" aria-hidden="true"></div>
      <div class="ig-skeleton" aria-hidden="true"></div>
      <div class="ig-skeleton" aria-hidden="true"></div>
      <div class="ig-skeleton" aria-hidden="true"></div>
      <div class="ig-skeleton" aria-hidden="true"></div>
      <div class="ig-skeleton" aria-hidden="true"></div>
      <div class="ig-skeleton" aria-hidden="true"></div>
      <div class="ig-skeleton" aria-hidden="true"></div>
      <div class="ig-skeleton" aria-hidden="true"></div>
      <div class="ig-skeleton" aria-hidden="true"></div>
    </div>

    <div class="ig-feed-footer">
      <a class="ig-cta-button"
         href="https://www.instagram.com/fitwith_ange/"
         target="_blank"
         rel="noopener noreferrer">
        View full profile on Instagram
      </a>
    </div>

  </div>
</section>

<style>
/* ------------------------------------------------------------------ */
/*  Instagram Feed — Scoped CSS                                         */
/*  Gold accent: #d4a574  |  Corners: 12px  |  Mobile-first            */
/* ------------------------------------------------------------------ */
.ig-feed-section {
  padding: 4rem 1rem;
  background: var(--bg-section, #faf9f7);
}

.ig-feed-container {
  max-width: 1100px;
  margin: 0 auto;
}

/* Header */
.ig-feed-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 2rem;
}

.ig-icon {
  width: 2.5rem;
  height: 2.5rem;
  color: #d4a574;
  flex-shrink: 0;
}

.ig-feed-heading-text {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.ig-feed-title {
  margin: 0;
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--color-heading, #1a1a1a);
  line-height: 1.2;
}

.ig-feed-handle {
  font-size: 0.95rem;
  color: #d4a574;
  text-decoration: none;
  font-weight: 500;
  letter-spacing: 0.02em;
  transition: opacity 0.2s;
}

.ig-feed-handle:hover {
  opacity: 0.75;
}

/* Grid */
.ig-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.75rem;
}

@media (max-width: 640px) {
  .ig-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 0.5rem;
  }
}

@media (max-width: 380px) {
  .ig-grid {
    grid-template-columns: 1fr;
  }
}

/* Individual post tile */
.ig-tile {
  position: relative;
  display: block;
  border-radius: 12px;
  overflow: hidden;
  aspect-ratio: 1 / 1;
  background: #e8e0d8;
  text-decoration: none;
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.ig-tile:hover,
.ig-tile:focus-visible {
  transform: translateY(-3px) scale(1.01);
  box-shadow: 0 8px 24px rgba(212, 165, 116, 0.35);
  outline: 2px solid #d4a574;
  outline-offset: 3px;
}

.ig-tile img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}

.ig-tile:hover img {
  transform: scale(1.05);
}

/* Overlay on hover */
.ig-tile-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to top,
    rgba(26, 26, 26, 0.72) 0%,
    rgba(26, 26, 26, 0) 55%
  );
  opacity: 0;
  transition: opacity 0.3s ease;
  display: flex;
  align-items: flex-end;
  padding: 0.85rem;
}

.ig-tile:hover .ig-tile-overlay,
.ig-tile:focus-visible .ig-tile-overlay {
  opacity: 1;
}

.ig-tile-caption {
  color: #fff;
  font-size: 0.8rem;
  line-height: 1.4;
  margin: 0;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Video badge */
.ig-video-badge {
  position: absolute;
  top: 0.5rem;
  right: 0.5rem;
  background: rgba(212, 165, 116, 0.9);
  border-radius: 50%;
  width: 1.75rem;
  height: 1.75rem;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ig-video-badge svg {
  width: 0.9rem;
  height: 0.9rem;
  fill: #fff;
}

/* Skeleton loading */
.ig-skeleton {
  border-radius: 12px;
  aspect-ratio: 1 / 1;
  background: linear-gradient(90deg, #e8e0d8 25%, #f0ebe4 50%, #e8e0d8 75%);
  background-size: 200% 100%;
  animation: ig-shimmer 1.4s infinite;
}

@keyframes ig-shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Footer CTA */
.ig-feed-footer {
  margin-top: 2rem;
  text-align: center;
}

.ig-cta-button {
  display: inline-block;
  padding: 0.75rem 2rem;
  border: 2px solid #d4a574;
  border-radius: 50px;
  color: #d4a574;
  font-weight: 600;
  font-size: 0.95rem;
  text-decoration: none;
  letter-spacing: 0.04em;
  transition: background 0.2s ease, color 0.2s ease;
}

.ig-cta-button:hover,
.ig-cta-button:focus-visible {
  background: #d4a574;
  color: #fff;
  outline: none;
}

/* Error state */
.ig-error {
  grid-column: 1 / -1;
  text-align: center;
  padding: 2rem;
  color: var(--color-muted, #888);
  font-size: 0.95rem;
}
</style>

<script>
(function () {
  'use strict';

  /**
   * Render the Instagram feed from a local JSON file.
   * Falls back gracefully if the file is missing or malformed.
   */
  function renderIgFeed() {
    var grid = document.getElementById('ig-grid');
    if (!grid) return;

    fetch('assets/data/instagram.json')
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function (posts) {
        if (!Array.isArray(posts) || posts.length === 0) {
          throw new Error('No posts found in instagram.json');
        }
        // Clear skeletons
        grid.innerHTML = '';

        posts.slice(0, 12).forEach(function (post) {
          var tile = buildTile(post);
          grid.appendChild(tile);
        });
      })
      .catch(function (err) {
        grid.innerHTML =
          '<p class="ig-error">Could not load Instagram posts. ' +
          '<a href="https://www.instagram.com/fitwith_ange/" ' +
          'target="_blank" rel="noopener">View on Instagram</a>.</p>';
        console.warn('[ig-feed] Failed to load instagram.json:', err.message);
      });
  }

  /**
   * Build a single grid tile element from a post object.
   * @param {Object} post
   * @returns {HTMLElement}
   */
  function buildTile(post) {
    var a = document.createElement('a');
    a.className = 'ig-tile';
    a.href = post.post_url || 'https://www.instagram.com/fitwith_ange/';
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.setAttribute('role', 'listitem');

    var caption = post.caption_first_line || '';
    a.setAttribute(
      'aria-label',
      'Instagram post' + (caption ? ': ' + caption.slice(0, 80) : '')
    );

    // Image
    var img = document.createElement('img');
    img.loading = 'lazy';
    img.decoding = 'async';
    img.alt = caption.slice(0, 120) || 'Instagram post by @fitwith_ange';
    img.src = post.thumbnail || post.thumbnail_url || '';
    img.onerror = function () {
      this.style.display = 'none';
      a.style.background = '#e8e0d8';
    };
    a.appendChild(img);

    // Overlay
    if (caption) {
      var overlay = document.createElement('div');
      overlay.className = 'ig-tile-overlay';
      overlay.setAttribute('aria-hidden', 'true');
      var cap = document.createElement('p');
      cap.className = 'ig-tile-caption';
      cap.textContent = caption;
      overlay.appendChild(cap);
      a.appendChild(overlay);
    }

    // Video badge
    if (post.is_video) {
      var badge = document.createElement('span');
      badge.className = 'ig-video-badge';
      badge.setAttribute('aria-label', 'Video');
      badge.innerHTML =
        '<svg viewBox="0 0 24 24" aria-hidden="true">' +
        '<path d="M8 5v14l11-7z"/>' +
        '</svg>';
      a.appendChild(badge);
    }

    return a;
  }

  // Initialise when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', renderIgFeed);
  } else {
    renderIgFeed();
  }
})();
</script>
